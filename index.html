<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Mubarak Smart Islamic Academy</title>

    <!-- ===== PWA ===== -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0B132B">

    <!-- iOS SUPPORT -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ICON -->
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- ===== CSS ===== -->
    <link rel="stylesheet" href="./style.css">

    <!-- ===== FONTS ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ===== ICONS ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- ===== MOBILE TEXT FIX ===== -->
    <style>
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        input, button, textarea { font-size: 16px; }

        /* Install App Button - inlined to ensure visibility */
        #installAppBtn {
            display: none;
            background: #2ecc71;
            color: #0a1620;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: clamp(0.7rem, 0.9vw, 0.9rem);
            white-space: nowrap;
            flex-shrink: 0;
        }
        #installAppBtn:hover {
            background: #27ae60;
            transform: scale(1.02);
        }
        #installAppBtn i { margin-right: 6px; }

        @media (max-width: 768px) {
            #installAppBtn { font-size: 0.65rem; padding: 0.25rem 0.6rem; }
            #installAppBtn span { display: none; }
            #installAppBtn::before { content: "📲"; margin-right: 2px; }
            #installAppBtn i { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splashScreen">
        <div class="splash-container" id="splashContainer">
            <div class="quran-book closed" id="quranBook">
                <div class="book-cover"></div>
                <div class="book-page-left"></div>
                <div class="book-page-right"></div>
            </div>
            <div class="splash-title" id="splashTitle"></div>
            <div class="splash-arabic" id="splashArabic"></div>
            <div class="splash-tagline" id="splashTagline">Online Islamic Learning</div>
        </div>
    </div>

    <!-- ===== NAVBAR ===== -->
    <div class="navbar">
        <div class="logo-area">
            <button class="navbar-hamburger" id="navbarHamburger" onclick="toggleDashboardSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-quran-icon"><i class="fas fa-book-open"></i></div>
            <div class="logo-text">
                <h1>Mubarak Smart Islamic Academy</h1>
                
                <center><p>الأكاديمية الإسلامية للتميز القرآني</p></center>
                <center><p>Online Islamic Learning</p></center>
            </div>
        </div>
        <div class="nav-links">
            <button class="nav-btn" onclick="showPage('home')">Home</button>
            <button class="nav-btn" onclick="showPage('courses')">Cours</button>
            <button class="nav-btn" onclick="showPage('teachers')">Tcher</button>
            <button class="nav-btn admin-dashboard-btn" id="adminDashboardBtn" onclick="handleDashboardClick()">
                <i class="fas fa-tachometer-alt"></i> Dash
            </button>
            <!-- Notification Bell -->
            <button class="nav-btn" id="notificationBell" onclick="toggleNotificationPanel()" style="position:relative;">
                <i class="fas fa-bell"></i>
                <span id="notificationBadge" style="position:absolute; top:-8px; right:-8px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:0.6rem; display:none;">0</span>
            </button>
            <!-- 🔴 LIVE JOIN BUTTON (appears when live is active) -->
            <button class="nav-btn live-join-nav-btn" id="liveJoinNavBtn" onclick="window.joinLiveClass()" style="display:none;">
                <i class="fas fa-video"></i> 🔴 JOIN LIVE
            </button>
            <!-- 📲 INSTALL APP BUTTON (appears when PWA install is supported) -->
            <button id="installAppBtn" onclick="installApp()">
                <i class="fas fa-download"></i> <span>Install App</span>
            </button>
            <button class="nav-btn" id="logoutBtn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- ===== SIDEBAR OVERLAY ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== DASHBOARD SIDEBAR ===== -->
    <aside class="dashboard-sidebar" id="dashboardSidebar">
        <div class="sidebar-header">
            <div class="navbar-quran-icon" style="width:34px;height:34px;font-size:1.2rem;border-width:2px;">
                <i class="fas fa-book-open"></i>
            </div>
            <span class="sidebar-brand">Mubarak Academy</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="sidebar-link active" data-section="dashboard" onclick="switchDashboardSection('dashboard')">
                <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
            </a>
            <a href="#" class="sidebar-link" data-section="live" onclick="switchDashboardSection('live')">
                <i class="fas fa-video"></i><span>Live Classes</span>
                <span class="sidebar-badge live-badge" id="liveStatusBadge" style="display:none;">LIVE</span>
            </a>
            <a href="#" class="sidebar-link" data-section="students" onclick="switchDashboardSection('students')">
                <i class="fas fa-users"></i><span>Students</span>
                <span class="sidebar-badge" id="studentCount">0</span>
            </a>
            <a href="#" class="sidebar-link" data-section="attendance" onclick="switchDashboardSection('attendance')">
                <i class="fas fa-check-circle"></i><span>Attendance</span>
            </a>
            <a href="#" class="sidebar-link" data-section="teachersManage" onclick="switchDashboardSection('teachersManage')">
                <i class="fas fa-chalkboard-user"></i><span>Teachers</span>
                <span class="sidebar-badge" id="teacherCount">0</span>
            </a>
            <a href="#" class="sidebar-link" data-section="notifications" onclick="switchDashboardSection('notifications')">
                <i class="fas fa-bell"></i><span>Notifications</span>
                <span class="sidebar-badge" id="notifCount">0</span>
            </a>
            <a href="#" class="sidebar-link" data-section="settings" onclick="switchDashboardSection('settings')">
                <i class="fas fa-cog"></i><span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" onclick="handleLogout()">
                <img src="https://ui-avatars.com/api/?name=Admin&background=e2b13b&color=0a1620" alt="Admin" class="sidebar-avatar">
                <div class="sidebar-user-info">
                    <span class="sidebar-username">Admin</span>
                    <span class="sidebar-userrole">Click to Logout</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ===== APP CONTAINER ===== -->
    <div id="appContainer" class="container"></div>

    <!-- ===== WHATSAPP FLOAT (now opens a modal) ===== -->
    <a href="#" id="whatsappFloatBtn" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- ===== WHATSAPP MODAL ===== -->
    <div id="whatsappModal" style="display:none;">
        <div class="modal-overlay" onclick="closeWhatsAppModal()"></div>
        <div class="modal-content">
            <span class="modal-close" onclick="closeWhatsAppModal()">&times;</span>
            <h3><i class="fab fa-whatsapp" style="color:#25D366;"></i> Contact Us</h3>
            <form id="whatsappForm" onsubmit="return false;">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="waFullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="waUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Gmail / Email *</label>
                    <input type="email" id="waEmail" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label>Message *</label>
                    <textarea id="waMessage" rows="4" placeholder="Write your message here..." required></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" onclick="sendWhatsAppMessage()" class="btn-send">
                        <i class="fab fa-whatsapp"></i> Send on WhatsApp
                    </button>
                    <button type="button" onclick="closeWhatsAppModal()" class="btn-cancel">Cancel</button>
                </div>
                <div id="waError" style="color:#ff6b6b; margin-top:0.5rem; display:none;"></div>
            </form>
        </div>
    </div>

    <!-- ===== LIVE CLASS PANEL (slides up from bottom) ===== -->
    <div id="livePanel">
        <div class="live-panel-header">
            <span class="live-panel-title" id="livePanelTitle">📹 Live Class</span>
            <div class="live-panel-actions">
                <button id="minimizeLiveBtn" onclick="minimizeLiveClass()" title="Minimize">
                    <i class="fas fa-window-minimize"></i>
                </button>
                <button id="closeLiveBtn" class="leave-btn" onclick="leaveLiveClass()">✕ Leave</button>
                <button id="endClassBtn" class="end-btn" onclick="endLiveClass()" style="display:none;">⏹ End</button>
            </div>
        </div>
        <div class="live-panel-body">
            <div id="jitsiIframeContainer"></div>
            <div class="live-controls">
                <button id="toggleMicBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i> Mute</button>
                <button id="toggleCamBtn" onclick="toggleCam()"><i class="fas fa-video"></i> Camera</button>
                <button id="shareScreenBtn" onclick="shareScreen()"><i class="fas fa-desktop"></i> Share</button>
            </div>
        </div>
        <div id="jitsiConnectionStatus" style="display:none; padding:1rem; text-align:center;">
            <i class="fas fa-exclamation-triangle" style="color:var(--gold); font-size:1.5rem;"></i>
            <p id="connectionMessage" style="color:#fff;">Reconnecting...</p>
            <button onclick="retryJitsiConnection()" style="background:var(--gold); color:#0a1620; padding:8px 20px; border-radius:30px; border:none; font-weight:600; cursor:pointer;">Retry</button>
        </div>
    </div>

    <!-- ===== MINI PLAYER (floating, draggable) ===== -->
    <div id="miniPlayer" style="display:none;" onclick="restoreLiveClass()">
        <div id="miniPlayerIframeContainer"></div>
        <div class="mini-player-overlay">
            <button id="miniLeaveBtn" onclick="event.stopPropagation(); leaveLiveClass();">✕</button>
            <span class="mini-live-label">🔴 LIVE</span>
        </div>
    </div>

    <!-- Jitsi External API -->
    <script src="https://meet.jit.si/external_api.js"></script>
    <!-- Main Script -->
    <script src="./script.js"></script>
</body>
</html>
